{% extends 'base.html' %}
{% block title %} - Log Adherence{% endblock %}
{% block content %}
<h1>Log Adherence</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <label>Agent Shift</label>
        <select name="shift_id">
            {% for shift in shifts %}
            <option value="{{ shift.pk }}">{{ shift.agent.user.get_full_name }} ({{ shift.start_time }}-{{ shift.end_time }})</option>
            {% endfor %}
        </select>
        <label>Status</label>
        <select name="status">
            <option value="on_time">On Time</option>
            <option value="late">Late</option>
            <option value="absent">Absent</option>
            <option value="early_leave">Left Early</option>
            <option value="extended_break">Extended Break</option>
            <option value="unscheduled_break">Unscheduled Break</option>
        </select>
        <label>Actual Start Time</label>
        <input type="time" name="actual_start">
        <label>Actual End Time</label>
        <input type="time" name="actual_end">
        <label>Notes</label>
        <textarea name="notes" rows="3"></textarea>
        <button type="submit" class="btn btn-primary">Save Record</button>
    </form>
</div>
{% endblock %}
