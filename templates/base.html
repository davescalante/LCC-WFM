<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>LCC Workforce Management{% block title %}{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a3a5c; color: white; padding: 0 24px; display: flex; align-items: center; height: 56px; }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 32px; }
        nav a { color: #cde; text-decoration: none; margin-right: 20px; font-size: 14px; }
        nav a:hover { color: white; }
        .container { margin-top: 24px; padding: 0 24px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a3a5c; }
        h2 { font-size: 18px; margin-bottom: 12px; color: #1a3a5c; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #d1d5db; font-size: 14px; }
        th { background: #e8edf4; font-weight: 600; color: #555; }
        tr:hover td { background: #dbeafe; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #1a3a5c; color: white; }
        .btn-primary:hover { background: #254e7a; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-green { background: #d4edda; color: #155724; }
        .badge-red { background: #f8d7da; color: #721c24; }
        .badge-yellow { background: #fff3cd; color: #856404; }
        .badge-blue { background: #d1ecf1; color: #0c5460; }
        form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #555; }
        form input, form select, form textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .stat { text-align: center; }
        .stat .number { font-size: 36px; font-weight: bold; color: #1a3a5c; }
        .stat .label { font-size: 13px; color: #888; margin-top: 4px; }
        .alert { background: #d4edda; color: #155724; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <div class="brand">LCC WFM</div>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'agent_list' %}">Users</a>
        <a href="{% url 'shift_list' %}">Shifts</a>
        <a href="{% url 'overtime_list' %}">OT Shifts</a>
        <a href="{% url 'adherence_dashboard' %}">Adherence</a>
        <a href="{% url 'codings_week' %}">Codings</a>
        <a href="{% url 'daily_hours' %}">Daily Hours</a>
        <a href="{% url 'erlang_calculator' %}">Erlang Calculator</a>
        <a href="{% url 'erlang_reports' %}">Reports</a>
        <a href="{% url 'records_attendance' %}">Records</a>
        <a href="{% url 'activity_log' %}">Activity</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
<script>
/* Floating sticky header for overflow-x:auto tables.
   CSS sticky doesn't work inside overflow-x:auto containers because they become
   scroll containers themselves. This clones the thead and pins it via position:fixed. */
function _initStickyHeader(container) {
    if (!container) return;
    var table = container.querySelector('table');
    if (!table || !table.querySelector('thead')) return;
    var thead = table.querySelector('thead');
    var NAV_H = 0;

    var sample = thead.querySelector('th');
    var hdrBg = sample ? getComputedStyle(sample).backgroundColor : '#e8edf4';
    if (!hdrBg || hdrBg === 'rgba(0, 0, 0, 0)') hdrBg = '#e8edf4';

    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;top:' + NAV_H + 'px;z-index:50;overflow:hidden;display:none;box-shadow:0 2px 4px rgba(0,0,0,.1);';

    var ft = document.createElement('table');
    ft.className = table.className;
    ft.style.cssText = (table.getAttribute('style') || '') + ';margin:0;';
    var cg = table.querySelector('colgroup');
    if (cg) ft.appendChild(cg.cloneNode(true));

    var fth = thead.cloneNode(true);
    ft.appendChild(fth);
    wrap.appendChild(ft);
    document.body.appendChild(wrap);

    function applyBg() {
        Array.from(fth.querySelectorAll('th')).forEach(function(th) {
            if (!th.classList.contains('col-today') && !th.classList.contains('col-today-th'))
                th.style.backgroundColor = hdrBg;
        });
    }
    applyBg();

    function syncWidths() {
        var orig = Array.from(thead.querySelectorAll('th'));
        var clone = Array.from(fth.querySelectorAll('th'));
        orig.forEach(function(th, i) {
            if (clone[i]) { clone[i].style.width = th.offsetWidth + 'px'; clone[i].style.minWidth = th.offsetWidth + 'px'; }
        });
    }

    var active = false;
    function tick() {
        var cr = container.getBoundingClientRect();
        var tr = thead.getBoundingClientRect();
        if (tr.bottom < NAV_H && cr.bottom > NAV_H + 30) {
            wrap.style.left = cr.left + 'px';
            wrap.style.width = cr.width + 'px';
            wrap.scrollLeft = container.scrollLeft;
            if (!active) { syncWidths(); wrap.style.display = 'block'; active = true; }
        } else if (active) {
            wrap.style.display = 'none'; active = false;
        }
    }

    container.addEventListener('scroll', function() { if (active) wrap.scrollLeft = container.scrollLeft; });

    wrap.addEventListener('click', function(e) {
        var cloneTh = e.target.closest('th');
        if (!cloneTh) return;
        var clones = Array.from(fth.querySelectorAll('th'));
        var origs = Array.from(thead.querySelectorAll('th'));
        var i = clones.indexOf(cloneTh);
        if (i >= 0 && origs[i]) {
            origs[i].click();
            setTimeout(function() { fth.innerHTML = thead.innerHTML; applyBg(); syncWidths(); }, 20);
        }
    });

    window.addEventListener('scroll', tick, {passive: true});
    window.addEventListener('resize', function() { active = false; wrap.style.display = 'none'; setTimeout(tick, 60); });
    setTimeout(tick, 80);
}
</script>
</body>
</html>
