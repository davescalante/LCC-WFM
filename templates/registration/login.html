<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC Workforce Management — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
        h1 { color: #1a3a5c; font-size: 22px; margin-bottom: 8px; }
        p { color: #888; font-size: 13px; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; padding: 10px; background: #1a3a5c; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button:hover { background: #254e7a; }
        .pw-wrap { position: relative; margin-bottom: 16px; }
        .pw-wrap input { margin-bottom: 0; padding-right: 40px; }
        .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; width: auto; padding: 0; color: #888; display: flex; align-items: center; }
        .pw-toggle:hover { color: #1a3a5c; background: none; }
        .error { color: #c0392b; font-size: 13px; margin-bottom: 12px; }
        .expired-msg { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 4px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>LCC Workforce Management</h1>
        <p>Sign in to continue</p>
        <div id="expired-banner" class="expired-msg" style="display:none;">Your session has expired. Please log in again to continue.</div>
        {% if form.errors %}
        <div class="error">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" autofocus>
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" name="password" id="id_password">
                <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-btn" aria-label="Show password">
                    <svg id="pw-icon-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="pw-icon-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        if (new URLSearchParams(window.location.search).get('expired') === '1') {
            document.getElementById('expired-banner').style.display = 'block';
        }
        function togglePw() {
            var inp = document.getElementById('id_password');
            var show = document.getElementById('pw-icon-show');
            var hide = document.getElementById('pw-icon-hide');
            if (inp.type === 'password') {
                inp.type = 'text';
                show.style.display = 'none';
                hide.style.display = '';
            } else {
                inp.type = 'password';
                show.style.display = '';
                hide.style.display = 'none';
            }
        }
    </script>
</body>
</html>
