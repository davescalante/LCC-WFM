{% extends 'base.html' %}
{% block title %} - Agents{% endblock %}
{% block content %}
<h1>Agents</h1>
<div class="card">
    <table>
        <thead>
            <tr><th>Name</th><th>Role</th><th>Team</th><th>Email</th></tr>
        </thead>
        <tbody>
            {% for agent in agents %}
            <tr>
                <td><a href="{% url 'agent_detail' agent.pk %}">{{ agent.user.get_full_name }}</a></td>
                <td><span class="badge badge-blue">{{ agent.get_role_display }}</span></td>
                <td>{{ agent.team }}</td>
                <td>{{ agent.user.email }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4" style="color:#888;">No agents found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
