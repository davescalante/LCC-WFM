{% extends 'base.html' %}
{% block title %} - {{ title }}{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1>{{ title }}</h1>
    <a href="{% url 'shift_list' %}" class="btn" style="background:#888;color:white;">Cancel</a>
</div>
<div class="card" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:#c0392b;font-size:12px;">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="margin-top:8px;">Save Shift</button>
    </form>
</div>
<style>
    .form-input, select, textarea, input[type="date"], input[type="time"], input[type="text"] {
        width:100%; padding:8px 10px; border:1px solid #ddd; border-radius:4px; font-size:14px; margin-bottom:14px;
    }
    label { display:block; font-size:13px; font-weight:600; margin-bottom:4px; color:#555; }
</style>
{% endblock %}
